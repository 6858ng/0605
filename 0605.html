<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>魚類介紹 AR</title>

<script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

a-scene {
  width: 100%;
  height: 100%;
  position: fixed;
  top: 0;
  left: 0;
}

/* 隱藏 MindAR 預設 UI */
.mindar-ui-loading,
.mindar-ui-error,
.mindar-ui-scanning {
  display: none;
}

/* 介紹文字框 */
#info-box {
  display: none;

  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);

  width: 85%;
  max-width: 600px;

  background: rgba(0,0,0,0.7);
  color: white;

  padding: 16px;

  border-radius: 12px;

  font-size: 18px;
  line-height: 1.6;

  z-index: 9999;
}
</style>
</head>

<body>

<!-- 文字介紹區 -->
<div id="info-box"></div>

<!-- AR 場景 -->
<a-scene
mindar-image="
  imageTargetSrc: targets.mind;
  autoStart: true;
  uiLoading: no;
  uiScanning: no;
  uiError: no;
"
color-space="sRGB"
renderer="colorManagement: true, physicallyCorrectLights"
vr-mode-ui="enabled: false"
device-orientation-permission-ui="enabled: false"
>

<!-- 相機 -->
<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<!-- ========================= -->
<!-- 吳郭魚 -->
<!-- ========================= -->
<a-entity mindar-image-target="targetIndex: 0" id="tilapia-target">

  <a-image
    src="tilapia.jpg"
    position="0 0 0"
    width="1"
    height="0.7"

    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 8000;
      easing: linear;
    "
  ></a-image>

</a-entity>

<!-- ========================= -->
<!-- 鮭魚 -->
<!-- ========================= -->
<a-entity mindar-image-target="targetIndex: 1" id="salmon-target">

  <a-image
    src="salmon.jpg"
    position="0 0 0"
    width="1"
    height="0.7"

    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 8000;
      easing: linear;
    "
  ></a-image>

</a-entity>

<!-- ========================= -->
<!-- 鱸魚 -->
<!-- ========================= -->
<a-entity mindar-image-target="targetIndex: 2" id="bass-target">

  <a-image
    src="bass.jpg"
    position="0 0 0"
    width="1"
    height="0.7"

    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 8000;
      easing: linear;
    "
  ></a-image>

</a-entity>

<!-- ========================= -->
<!-- 小丑魚 -->
<!-- ========================= -->
<a-entity mindar-image-target="targetIndex: 3" id="clownfish-target">

  <a-image
    src="clownfish.jpg"
    position="0 0 0"
    width="1"
    height="0.7"

    animation="
      property: rotation;
      to: 0 360 0;
      loop: true;
      dur: 8000;
      easing: linear;
    "
  ></a-image>

</a-entity>

</a-scene>

<script>

window.addEventListener("load", () => {

  const infoBox = document.querySelector("#info-box");

  // 四種魚介紹資料
  const fishData = {

    "tilapia-target": `
      <h2>吳郭魚</h2>
      生活環境：淡水、養殖場<br>
      食物：水草、藻類（雜食）<br>
      可食用：可以<br>
      生態影響：大量繁殖可能破壞生態
    `,

    "salmon-target": `
      <h2>鮭魚</h2>
      生活環境：淡水與海洋<br>
      食物：小魚蝦、浮游生物<br>
      可食用：可以<br>
      生態影響：過度捕撈可能造成失衡
    `,

    "bass-target": `
      <h2>鱸魚</h2>
      生活環境：海水沿岸<br>
      食物：小魚蝦、甲殼類<br>
      可食用：可以<br>
      生態影響：控制小型魚類數量
    `,

    "clownfish-target": `
      <h2>小丑魚</h2>
      生活環境：珊瑚礁<br>
      食物：藻類、浮游生物<br>
      可食用：不建議<br>
      生態影響：與海葵共生，維持珊瑚礁平衡
    `
  };

  // 綁定所有 target
  Object.keys(fishData).forEach(id => {

    const target = document.querySelector(`#${id}`);

    // 掃描到
    target.addEventListener("targetFound", () => {

      infoBox.innerHTML = fishData[id];
      infoBox.style.display = "block";

    });

    // 消失
    target.addEventListener("targetLost", () => {

      infoBox.style.display = "none";

    });

  });

});

</script>

</body>
</html>
